<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niyata Consulting - Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">

const { useState, useEffect } = React;

function Dashboard() {

const [kpi, setKpi] = useState({delivery:0, waiting:0, stock:0});

useEffect(()=>{
    updateData();
    const t = setInterval(updateData,3000);
    return ()=>clearInterval(t);
},[]);

function updateData(){
    setKpi({
        delivery: Math.floor(Math.random()*50)+250,
        waiting: (Math.random()*2+2).toFixed(1),
        stock: (Math.random()*2+4).toFixed(1)
    });
}

return (
<div className="max-w-5xl mx-auto p-6">

<h1 className="text-3xl font-bold mb-6">Niyata Consulting Dashboard</h1>

<div className="grid md:grid-cols-3 gap-4 mb-6">

<div className="bg-white p-5 rounded-xl shadow">
<p className="text-gray-500">Total Deliveries</p>
<p className="text-2xl font-bold">{kpi.delivery}</p>
</div>

<div className="bg-white p-5 rounded-xl shadow">
<p className="text-gray-500">Avg Waiting Time</p>
<p className="text-2xl font-bold">{kpi.waiting} h</p>
</div>

<div className="bg-white p-5 rounded-xl shadow">
<p className="text-gray-500">Stock Turnover</p>
<p className="text-2xl font-bold">{kpi.stock}</p>
</div>

</div>

<div className="bg-white p-6 rounded-xl shadow">
<h2 className="font-bold mb-3">Insight</h2>
<p>
{
kpi.waiting > 3
? "Waiting time tinggi, potensi bottleneck di transport."
: "Operasi relatif stabil."
}
</p>
</div>

<div className="mt-6">
<a href="index.html" className="text-blue-600 underline">← Kembali</a>
</div>

</div>
);
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard/>);

</script>

</body>
</html>
